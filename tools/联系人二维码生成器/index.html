
<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>联系人二维码生成器</title>
<style>
button {
	color: black;
	background: transparent;
	outline: 1px solid black;
	border: 0px;
	padding: 5px 10px;
	cursor: pointer;
}
a {
	color: white;
    text-decoration: none;
}
*{
	margin:0;
	padding:0;
}
body{
background-color: #262626;       
}
#box{
	width:1000px;
	height:250px;
	margin-left:250px;
	margin-top: 120px;
}
#box .qrcode{
	width:400px;
	height:400px;
	float: left;
}
#box .introduce{
	width:580px;
	height: 300px;
	float: left;
}
.introduce p{
	width:250px;
	height:40px;
	background: #333; 
	float: left;
	margin:10px 20px;
	color:#fff;
	border-radius: 5px;
	overflow: hidden;
}
.introduce p span{
	float: left;
	width:50px;
	height:40px;
	color:#fff;
	text-align: center;
	line-height: 40px;
}
.introduce p input{
	width:200px;
	height:40px;
	float: left;
	border: 0;
	color:#fff;
	background:#000;
	text-indent:5px; 
	outline: none;
}
.introduce .btn{
	border: #fff 10px;
	width:440px;
	height:40px;
	text-align: center;
	font-weight: bold;
	line-height: 40px;
	background: #000;
}
.qrcode>img{
	display: block;border:5px solid white;
}
</style>
</head>
<body style="">

<div id="box">
	<h3 style="color: deepskyblue;">&nbsp;&nbsp;&nbsp;&nbsp;请用微信扫描二维码，查看效果</h3>
	<div class="introduce">
		<p>
			<span>姓名:</span>
			<input type="text" id="name" value="暗影">
		</p>
		<p>
			<span>公司:</span>
			<input type="text" id="company" value="暗部">
		</p>
		<p>
			<span>职务:</span>
			<input type="text" id="title" value="程序员">
		</p>
		<p>
			<span>地址:</span>
			<input type="text" id="address" value="地球">
		</p>
		<p>
			<span>手机:</span>
			<input type="text" id="mobile" value="">
		</p>
		<p>
			<span>邮箱:</span>
			<input type="text" id="email" value="">
		</p>
		<p>
			<span>网址:</span>
			<input type="text" id="web" value="https://dsanying.gitee.io">

		<p>
			<span>备注:</span>
			<input type="text" id="desc" value="暗影无际,暗夜无边">
		</p>
		<p class="btn">生成联系人二维码</p>
	</div>
	<div class="qrcode" id="qrcode"></div>
</div>

<script src="./jquery.min.js"></script>
<script src="./qrcode.js"></script>
<script>
var name, company, title, address, mobile, email, web, desc;
name = "FN:" + $("#name").val() + "\n";             //姓名
	company = "ORG:" + $("#company").val() + "\n";      //公司
	title = "TITLE:" + $("#title").val() + "\n";        //职务
	address = "WORK:" + $("#address").val() + "\n";     //地址
	mobile = "TEL:" + $("#mobile").val() + "\n";        //手机
	email = "EMAIL:" + $("#email").val() + "\n";        //邮箱
	web = "URL:" + $("#web").val() + "\n";              //网址
	desc = "NOTE:" + $("#desc").val() + "\n";           //备注

	var info = "BEGIN:VCARD\n" + name + company + title + address + mobile + email + web + desc + "END:VCARD";
	//console.log(info);
	//生成二维码
	var qrcode = new QRCode("qrcode");
	qrcode.makeCode(info);
$(".btn").click(function() {
	name = "FN:" + $("#name").val() + "\n";             //姓名
	company = "ORG:" + $("#company").val() + "\n";      //公司
	title = "TITLE:" + $("#title").val() + "\n";        //职务
	address = "WORK:" + $("#address").val() + "\n";     //地址
	mobile = "TEL:" + $("#mobile").val() + "\n";        //手机
	email = "EMAIL:" + $("#email").val() + "\n";        //邮箱
	web = "URL:" + $("#web").val() + "\n";              //网址
	desc = "NOTE:" + $("#desc").val() + "\n";           //备注

	var info = "BEGIN:VCARD\n" + name + company + title + address + mobile + email + web + desc + "END:VCARD";
	//console.log(info);
	//生成二维码
	var qrcode = new QRCode("qrcode");
	qrcode.makeCode(info);

})
</script>
<button style="z-index: 1000;margin-left: 620px;"><a href="https://dsanying.gitee.io">首页</a></button>
<button><a href="https://dsanying.gitee.io/tools">工具箱</a></button>        

</body></html>
